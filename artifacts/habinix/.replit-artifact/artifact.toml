kind = "web"
previewPath = "/"
title = "Habinix LLC"
version = "1.0.0"
id = "artifacts/habinix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23745

[services.development]
run = "pnpm --filter @workspace/habinix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/habinix", "run", "build" ]
publicDir = "artifacts/habinix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23745"
BASE_PATH = "/"
