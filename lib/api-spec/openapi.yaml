openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Habinix LLC corporate website
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Contact form operations
  - name: payments
    description: Payment and sponsorship operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit contact form
      description: Submits a contact inquiry from a visitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "200":
          description: Contact form submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResult"
        "400":
          description: Invalid input

  /subscribe:
    post:
      operationId: subscribeEmail
      tags: [payments]
      summary: Subscribe email for gateway launch notification
      description: Registers an email to be notified when the payment gateway goes live
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscribeInput"
      responses:
        "200":
          description: Email registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscribeResult"
        "400":
          description: Invalid input

  /payments/status:
    get:
      operationId: getPaymentStatus
      tags: [payments]
      summary: Get payment gateway status
      description: Returns whether the payment gateway is live or in placeholder mode
      responses:
        "200":
          description: Payment gateway status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatus"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ContactInput:
      type: object
      required:
        - name
        - email
        - message
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        businessQuery:
          type: string
        message:
          type: string
          minLength: 1

    ContactResult:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string

    SubscribeInput:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    SubscribeResult:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string

    PaymentStatus:
      type: object
      required:
        - live
        - mode
      properties:
        live:
          type: boolean
        mode:
          type: string
        message:
          type: string
